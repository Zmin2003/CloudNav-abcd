<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Zmin Nav</title>
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const useDark = storedTheme ? storedTheme === 'dark' : prefersDark;
        const root = document.documentElement;

        root.classList.toggle('dark', useDark);
        root.style.colorScheme = useDark ? 'dark' : 'light';
        root.style.backgroundColor = useDark ? '#020617' : '#f8fafc';
      } catch {
        document.documentElement.style.backgroundColor = '#f8fafc';
      }
    })();
  </script>
  <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
